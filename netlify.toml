# ===================================================
# netlify.toml — הגדרות פריסה של Netlify
# ===================================================
# קובץ זה אומר ל-Netlify איך לפרסם את האתר.
# publish = "." פירושו: פרסם מהתיקייה הראשית (כי אין build)

[build]
  publish = "."
  command = ""

# הגדרת נתיב לניהול תוכן (Decap CMS)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
