# ===================================================
# config.yml — הגדרות לוח הניהול (Decap CMS)
# ===================================================
# קובץ זה מגדיר:
# 1. מאין לשמור שינויים (GitHub דרך Netlify)
# 2. אילו שדות יופיעו בממשק העריכה של תמר

# ---------- Backend: חיבור ל-GitHub דרך Netlify ----------
backend:
  name: git-gateway
  branch: main       # השם של הענף הראשי ב-GitHub

# ---------- מיקום תמונות ----------
media_folder: images
public_folder: /images

# ---------- שמות לממשק בעברית ----------
locale: he

# ===================================================
# COLLECTIONS — האוספים שתמר תוכל לערוך
# ===================================================
# אנחנו משתמשים ב-"files" כי יש לנו קובץ אחד (content.json)
# שמכיל את כל התוכן של האתר.

collections:
  - name: "site"
    label: "✏️ עריכת תוכן האתר"
    files:

      # -----------------------------------------------
      # הקובץ הראשי — content.json
      # -----------------------------------------------
      - name: "content"
        label: "כל תוכן האתר"
        file: "content.json"
        format: "json"
        fields:

          # =====================
          # חלק ראשי — Hero
          # =====================
          - label: "🏠 חלק ראשי (עמוד הבית)"
            name: "hero"
            widget: "object"
            fields:
              - label: "שורת פתיחה קטנה"
                name: "eyebrow"
                widget: "string"
                hint: "השורה הקטנה שמופיעה מעל הכותרת הגדולה"

              - label: "כותרת ראשית"
                name: "title"
                widget: "string"
                hint: "אפשר להשתמש ב-<br> למעבר שורה"

              - label: "פסקת תיאור"
                name: "subtitle"
                widget: "text"
                hint: "הטקסט שמופיע מתחת לכותרת הגדולה"

              - label: "טקסט הכפתור"
                name: "cta_text"
                widget: "string"

          # =====================
          # למי מתאים — Pain Points
          # =====================
          - label: "🎯 למי מתאים?"
            name: "pain_points"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"

              - label: "כרטיסי סיבות"
                name: "items"
                widget: "list"
                label_singular: "כרטיס"
                fields:
                  - label: "אייקון (אמוג'י)"
                    name: "icon"
                    widget: "string"
                    hint: "לדוגמה: 🕐 או 🚗"

                  - label: "כותרת"
                    name: "title"
                    widget: "string"

                  - label: "תיאור קצר"
                    name: "description"
                    widget: "text"

          # =====================
          # אודות
          # =====================
          - label: "👤 אודות"
            name: "about"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"

              - label: "פסקה ראשונה"
                name: "p1"
                widget: "text"
                hint: "אפשר להשתמש ב-<strong>טקסט</strong> להדגשה"

              - label: "פסקה שנייה"
                name: "p2"
                widget: "text"

              - label: "פסקה שלישית"
                name: "p3"
                widget: "text"

              - label: "פסקה רביעית"
                name: "p4"
                widget: "text"

              - label: "מספרים (סטטיסטיקות)"
                name: "stats"
                widget: "object"
                fields:
                  - label: "שנות ניסיון"
                    name: "experience_years"
                    widget: "number"
                    value_type: "int"

                  - label: "שנים כעצמאית"
                    name: "independent_years"
                    widget: "number"
                    value_type: "int"

                  - label: "מחויבות (%)"
                    name: "commitment"
                    widget: "number"
                    value_type: "int"

          # =====================
          # שירותים
          # =====================
          - label: "🛎️ שירותים"
            name: "services"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"

              - label: "כרטיסי שירות"
                name: "items"
                widget: "list"
                label_singular: "שירות"
                fields:
                  - label: "אייקון (אמוג'י)"
                    name: "icon"
                    widget: "string"

                  - label: "שם השירות"
                    name: "title"
                    widget: "string"

                  - label: "תיאור השירות"
                    name: "description"
                    widget: "text"

          # =====================
          # חסכון / יתרונות
          # =====================
          - label: "💰 למה זה שווה?"
            name: "savings"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"

              - label: "פנלים (טאבים)"
                name: "items"
                widget: "list"
                label_singular: "פנל"
                fields:
                  - label: "כותרת הפנל"
                    name: "title"
                    widget: "string"

                  - label: "תיאור"
                    name: "description"
                    widget: "text"

          # =====================
          # המלצות
          # =====================
          - label: "⭐ המלצות"
            name: "testimonials"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"

              - label: "המלצות"
                name: "items"
                widget: "list"
                label_singular: "המלצה"
                fields:
                  - label: "טקסט ההמלצה"
                    name: "text"
                    widget: "text"

                  - label: "שם הממליץ"
                    name: "author_name"
                    widget: "string"

                  - label: "תפקיד / עסק"
                    name: "author_role"
                    widget: "string"

                  - label: "אות ראשונה לאווטאר"
                    name: "avatar_letter"
                    widget: "string"
                    hint: "אות אחת בלבד — האות הראשונה של השם"

          # =====================
          # יצירת קשר
          # =====================
          - label: "📞 יצירת קשר"
            name: "contact"
            widget: "object"
            fields:
              - label: "כותרת"
                name: "title"
                widget: "string"

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"

              - label: "מספר טלפון"
                name: "phone"
                widget: "string"

              - label: "כתובת אימייל"
                name: "email"
                widget: "string"
