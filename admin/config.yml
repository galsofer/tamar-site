# ===================================================
# config.yml — הגדרות לוח הניהול (Decap CMS)
# ===================================================

backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images
locale: he

collections:
  - name: "site"
    label: "✏️ עריכת תוכן האתר"
    files:

      - name: "content"
        label: "כל תוכן האתר"
        file: "content.json"
        format: "json"
        fields:

          # =====================
          # עיצוב גלובלי
          # =====================
          - label: "🎨 עיצוב האתר"
            name: "design"
            widget: "object"
            fields:
              - label: "גופן (פונט)"
                name: "font"
                widget: "select"
                hint: "הגופן שיופיע בכל האתר"
                options:
                  - { label: "Assistant (ברירת מחדל)", value: "Assistant" }
                  - { label: "Rubik — עגול ומודרני", value: "Rubik" }
                  - { label: "Heebo — נקי ופשוט", value: "Heebo" }
                  - { label: "Frank Ruhl Libre — קלאסי ואלגנטי", value: "Frank Ruhl Libre" }
                  - { label: "Secular One — בולט וחזק", value: "Secular One" }

              - label: "גודל טקסט כללי"
                name: "text_size"
                widget: "select"
                hint: "גודל הטקסט הכללי בכל האתר"
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל (ברירת מחדל)", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "צבע ראשי (כפתורים, קישורים)"
                name: "primary_color"
                widget: "color"
                default: "#8b6f4e"
                enableAlpha: false

              - label: "צבע טקסט כללי"
                name: "text_color"
                widget: "color"
                default: "#1a1a1a"
                enableAlpha: false

          # =====================
          # Hero — חלק ראשי
          # =====================
          - label: "🏠 חלק ראשי (עמוד הבית)"
            name: "hero"
            widget: "object"
            fields:
              - label: "שורת פתיחה קטנה"
                name: "eyebrow"
                widget: "string"
                hint: "השורה הקטנה מעל הכותרת"
              - label: "צבע שורת פתיחה"
                name: "eyebrow_color"
                widget: "color"
                default: "#8b6f4e"
                required: false
                enableAlpha: false
              - label: "גודל שורת פתיחה"
                name: "eyebrow_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "כותרת ראשית"
                name: "title"
                widget: "string"
                hint: "אפשר להשתמש ב-<br> למעבר שורה"
              - label: "צבע כותרת ראשית"
                name: "title_color"
                widget: "color"
                default: "#1a1a1a"
                required: false
                enableAlpha: false
              - label: "גודל כותרת ראשית"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "פסקת תיאור"
                name: "subtitle"
                widget: "text"
              - label: "צבע פסקת תיאור"
                name: "subtitle_color"
                widget: "color"
                default: "#444444"
                required: false
                enableAlpha: false
              - label: "גודל פסקת תיאור"
                name: "subtitle_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "טקסט הכפתור"
                name: "cta_text"
                widget: "string"

          # =====================
          # למי מתאים — Pain Points
          # =====================
          - label: "🎯 למי מתאים?"
            name: "pain_points"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#ffffff"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"
              - label: "צבע תת-כותרת"
                name: "subtitle_color"
                widget: "color"
                default: "#aaaaaa"
                required: false
                enableAlpha: false
              - label: "גודל תת-כותרת"
                name: "subtitle_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "כרטיסי סיבות"
                name: "items"
                widget: "list"
                label_singular: "כרטיס"
                fields:
                  - label: "אייקון (אמוג'י)"
                    name: "icon"
                    widget: "string"
                  - label: "כותרת"
                    name: "title"
                    widget: "string"
                  - label: "תיאור קצר"
                    name: "description"
                    widget: "text"

          # =====================
          # אודות
          # =====================
          - label: "👤 אודות"
            name: "about"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#1a1a1a"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "פסקה ראשונה"
                name: "p1"
                widget: "text"
                hint: "אפשר להשתמש ב-<strong>טקסט</strong> להדגשה"
              - label: "פסקה שנייה"
                name: "p2"
                widget: "text"
              - label: "פסקה שלישית"
                name: "p3"
                widget: "text"
              - label: "פסקה רביעית"
                name: "p4"
                widget: "text"

              - label: "צבע טקסט הפסקאות"
                name: "text_color"
                widget: "color"
                default: "#444444"
                required: false
                enableAlpha: false
              - label: "גודל טקסט הפסקאות"
                name: "text_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "מספרים (סטטיסטיקות)"
                name: "stats"
                widget: "object"
                fields:
                  - label: "שנות ניסיון"
                    name: "experience_years"
                    widget: "number"
                    value_type: "int"
                  - label: "שנים כעצמאית"
                    name: "independent_years"
                    widget: "number"
                    value_type: "int"
                  - label: "מחויבות (%)"
                    name: "commitment"
                    widget: "number"
                    value_type: "int"

          # =====================
          # שירותים
          # =====================
          - label: "🛎️ שירותים"
            name: "services"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#1a1a1a"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"
              - label: "צבע תת-כותרת"
                name: "subtitle_color"
                widget: "color"
                default: "#888888"
                required: false
                enableAlpha: false
              - label: "גודל תת-כותרת"
                name: "subtitle_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "כרטיסי שירות"
                name: "items"
                widget: "list"
                label_singular: "שירות"
                fields:
                  - label: "אייקון (אמוג'י)"
                    name: "icon"
                    widget: "string"
                  - label: "שם השירות"
                    name: "title"
                    widget: "string"
                  - label: "תיאור השירות"
                    name: "description"
                    widget: "text"

          # =====================
          # חסכון / יתרונות
          # =====================
          - label: "💰 למה זה שווה?"
            name: "savings"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#1a1a1a"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"
              - label: "צבע תת-כותרת"
                name: "subtitle_color"
                widget: "color"
                default: "#888888"
                required: false
                enableAlpha: false
              - label: "גודל תת-כותרת"
                name: "subtitle_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "פנלים (טאבים)"
                name: "items"
                widget: "list"
                label_singular: "פנל"
                fields:
                  - label: "תווית הכפתור"
                    name: "label"
                    widget: "string"
                    hint: "הטקסט שמופיע על כפתור הטאב — קצר (2-3 מילים)"
                  - label: "כותרת הפנל"
                    name: "title"
                    widget: "string"
                  - label: "צבע כותרת הפנל"
                    name: "title_color"
                    widget: "color"
                    default: "#1a1a1a"
                    required: false
                    enableAlpha: false
                  - label: "תיאור"
                    name: "description"
                    widget: "text"
                  - label: "צבע טקסט"
                    name: "text_color"
                    widget: "color"
                    default: "#444444"
                    required: false
                    enableAlpha: false
                  - label: "גודל טקסט"
                    name: "text_size"
                    widget: "select"
                    required: false
                    options:
                      - { label: "קטן", value: "small" }
                      - { label: "רגיל", value: "medium" }
                      - { label: "גדול", value: "large" }

          # =====================
          # המלצות
          # =====================
          - label: "⭐ המלצות"
            name: "testimonials"
            widget: "object"
            fields:
              - label: "כותרת הסקשן"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#1a1a1a"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"
              - label: "צבע תת-כותרת"
                name: "subtitle_color"
                widget: "color"
                default: "#888888"
                required: false
                enableAlpha: false

              - label: "המלצות"
                name: "items"
                widget: "list"
                label_singular: "המלצה"
                fields:
                  - label: "טקסט ההמלצה"
                    name: "text"
                    widget: "text"
                  - label: "צבע טקסט ההמלצה"
                    name: "text_color"
                    widget: "color"
                    default: "#444444"
                    required: false
                    enableAlpha: false
                  - label: "גודל טקסט ההמלצה"
                    name: "text_size"
                    widget: "select"
                    required: false
                    options:
                      - { label: "קטן", value: "small" }
                      - { label: "רגיל", value: "medium" }
                      - { label: "גדול", value: "large" }
                  - label: "שם הממליץ"
                    name: "author_name"
                    widget: "string"
                  - label: "תפקיד / עסק"
                    name: "author_role"
                    widget: "string"
                  - label: "אות ראשונה לאווטאר"
                    name: "avatar_letter"
                    widget: "string"
                    hint: "אות אחת בלבד — האות הראשונה של השם"

          # =====================
          # יצירת קשר
          # =====================
          - label: "📞 יצירת קשר"
            name: "contact"
            widget: "object"
            fields:
              - label: "כותרת"
                name: "title"
                widget: "string"
              - label: "צבע כותרת"
                name: "title_color"
                widget: "color"
                default: "#ffffff"
                required: false
                enableAlpha: false
              - label: "גודל כותרת"
                name: "title_size"
                widget: "select"
                required: false
                options:
                  - { label: "בינוני", value: "medium" }
                  - { label: "גדול", value: "large" }
                  - { label: "גדול מאוד", value: "xlarge" }

              - label: "תת-כותרת"
                name: "subtitle"
                widget: "text"
              - label: "צבע תת-כותרת"
                name: "subtitle_color"
                widget: "color"
                default: "#aaaaaa"
                required: false
                enableAlpha: false
              - label: "גודל תת-כותרת"
                name: "subtitle_size"
                widget: "select"
                required: false
                options:
                  - { label: "קטן", value: "small" }
                  - { label: "רגיל", value: "medium" }
                  - { label: "גדול", value: "large" }

              - label: "מספר טלפון"
                name: "phone"
                widget: "string"

              - label: "כתובת אימייל"
                name: "email"
                widget: "string"
